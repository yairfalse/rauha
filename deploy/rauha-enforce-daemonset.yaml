apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: rauha-enforce
  namespace: rauha-system
  labels:
    app: rauha-enforce
spec:
  selector:
    matchLabels:
      app: rauha-enforce
  template:
    metadata:
      labels:
        app: rauha-enforce
    spec:
      hostPID: true
      hostNetwork: true
      tolerations:
        - effect: NoSchedule
          operator: Exists
      containers:
        - name: rauha-enforce
          image: ghcr.io/rauha-runtime/rauha-enforce:latest
          args:
            - --policy-dir
            - /etc/rauha/policies
          securityContext:
            privileged: true
            capabilities:
              add:
                - BPF
                - SYS_ADMIN
                - PERFMON
          volumeMounts:
            - name: bpf
              mountPath: /sys/fs/bpf
            - name: cgroup
              mountPath: /sys/fs/cgroup
              readOnly: true
            - name: containerd-sock
              mountPath: /run/containerd/containerd.sock
            - name: policies
              mountPath: /etc/rauha/policies
              readOnly: true
      volumes:
        - name: bpf
          hostPath:
            path: /sys/fs/bpf
            type: DirectoryOrCreate
        - name: cgroup
          hostPath:
            path: /sys/fs/cgroup
            type: Directory
        - name: containerd-sock
          hostPath:
            path: /run/containerd/containerd.sock
            type: Socket
        - name: policies
          configMap:
            name: rauha-enforce-policies
---
apiVersion: v1
kind: Namespace
metadata:
  name: rauha-system
