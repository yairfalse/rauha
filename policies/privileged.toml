[zone]
name = "privileged"
type = "privileged"

[capabilities]
allowed = [
    "CAP_NET_BIND_SERVICE",
    "CAP_CHOWN",
    "CAP_SETUID",
    "CAP_SETGID",
    "CAP_DAC_OVERRIDE",
    "CAP_FOWNER",
    "CAP_KILL",
    "CAP_NET_RAW",
    "CAP_NET_ADMIN",
    "CAP_SYS_PTRACE",
    "CAP_SYS_ADMIN",
]

[resources]
cpu_shares = 2048
memory_limit = "8Gi"
io_weight = 200
pids_max = 4096

[network]
mode = "host"
allowed_zones = []
allowed_egress = ["0.0.0.0/0:0"]
allowed_ingress = ["0.0.0.0/0:0"]

[filesystem]
shared_layers = true
writable_paths = ["/"]

[devices]
allowed = ["/dev/null", "/dev/zero", "/dev/urandom", "/dev/random", "/dev/fuse"]

[syscalls]
deny = ["kexec_load", "reboot"]
