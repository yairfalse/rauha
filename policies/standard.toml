[zone]
name = "standard"
type = "non-global"

[capabilities]
allowed = [
    "CAP_NET_BIND_SERVICE",
    "CAP_CHOWN",
    "CAP_SETUID",
    "CAP_SETGID",
    "CAP_DAC_OVERRIDE",
    "CAP_FOWNER",
    "CAP_KILL",
    "CAP_NET_RAW",
]

[resources]
cpu_shares = 1024
memory_limit = "4Gi"
io_weight = 100
pids_max = 512

[network]
mode = "bridged"
allowed_zones = []
allowed_egress = ["0.0.0.0/0:443", "0.0.0.0/0:80"]
allowed_ingress = []

[filesystem]
shared_layers = true
writable_paths = ["/data", "/tmp", "/var/log", "/var/run"]

[devices]
allowed = ["/dev/null", "/dev/zero", "/dev/urandom", "/dev/random"]

[syscalls]
deny = ["mount", "umount2", "pivot_root", "kexec_load", "reboot"]
